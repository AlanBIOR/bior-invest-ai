{% load static %}

<button id="ai-chat-toggle" aria-label="Abrir chat con IA">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
    </svg>
</button>

<div id="ai-chat-window" 
     data-username="{{ request.user.username }}" 
     data-phone="{{ request.user.profile.whatsapp_number }}" 
     class="hidden fixed bottom-24 right-6 w-80 md:w-96 bg-gray-900 ...">
         
    <div class="chat-header">
        <div class="chat-title">
            <div class="status-dot"></div>
            <h3>BIOR Invest AI</h3>
        </div>
        <button id="ai-chat-close">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l18 18" />
            </svg>
        </button>
    </div>

    <div id="ai-chat-messages">
        <div class="ai-message">
            <div>
                <p>¡Hola, {{ request.user.username }}! Soy tu asesor patrimonial de BIOR Invest AI. ¿En qué puedo ayudarte con tu portafolio hoy?</p>
            </div>
        </div>
    </div>

    <div id="ai-chat-loading" class="hidden">
        <svg class="spinner" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        BIOR Invest AI está analizando...
    </div>

    <div class="chat-input-area">
        <input type="text" id="ai-chat-input" placeholder="Pregunta sobre Cetes, Bitcoin...">
        <button id="ai-chat-send">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
            </svg>
        </button>
    </div>
</div>
