{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="action-hub-container">
    
    <div class="nexus-header">
        <h1>🤖 NEXUS Advisor: Action Hub</h1>
        <p class="text-muted">Tu centro de inteligencia patrimonial. Descubre exactamente qué hacer con tu capital hoy.</p>
    </div>

    <div class="nexus-setup-form">
        <div class="input-grid">
            <div class="input-group">
                <label><i class="fas fa-wallet"></i> Capital extra para hoy</label>
                <input type="number" id="input-capital" value="0" step="100">
            </div>
            <div class="input-group">
                <label><i class="fas fa-hand-holding-usd"></i> Aportación mensual</label>
                <input type="number" id="input-aportacion" value="500" step="100">
            </div>
            <div class="input-group">
                <label><i class="fas fa-bullseye"></i> Enfoque deseado</label>
                <select id="input-preferencia">
                    <option value="Equilibrado">Equilibrado (Estrategia General)</option>
                    <option value="Renta Variable">Renta Variable (Crecimiento)</option>
                    <option value="Inmuebles">Inmuebles (FIBRAS/Rentas)</option>
                    <option value="Alternativas">Cripto/Alternativas (Riesgo)</option>
                    <option value="Renta Fija">Renta Fija (Preservación)</option>
                </select>
            </div>
        </div>
    </div>

    <div class="decision-action-wrapper">
        <button id="btn-decision-mode" class="btn-nexus-primary" data-url="{% url 'api_modo_decision' %}">
            <i class="fas fa-bolt"></i> Generar Plan de Acción Inmediato
        </button>
    </div>

    <div id="nexus-results-container" class="nexus-results-grid">
        </div>

    <div class="time-machine-section">
        <h3><i class="fas fa-hourglass-half"></i> Máquina del Tiempo (Simulador)</h3>
        <p class="text-muted">¿Qué habría pasado si implementabas esta estrategia hace un año?</p>
        <canvas id="timeMachineChart" height="100"></canvas>
    </div>
</div>
{% endblock %}
