{% extends 'base.html' %}
{% block content %}
<section class="auth-container">
    <div class="auth-card">
        <h2>Únete a BIOR Invest</h2>
        <form method="POST" class="auth-form">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="error-banner" style="color: #ff4d4d;">
                    <p>Revisa los errores en el formulario.</p>
                </div>
            {% endif %}

            <div class="input-group">
                <label>Nombre de Usuario</label>
                <input type="text" name="username" required value="{{ form.username.value|default:'' }}">
            </div>

            <div class="input-group" style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>Nombre</label>
                    <input type="text" name="first_name" required value="{{ form.first_name.value|default:'' }}">
                </div>
                <div style="flex: 1;">
                    <label>Apellidos</label>
                    <input type="text" name="last_name" required value="{{ form.last_name.value|default:'' }}">
                </div>
            </div>

            <div class="input-group">
                <label>WhatsApp (con código de país)</label>
                <input type="text" name="whatsapp_number" placeholder="Ej: 5212411234567" required value="{{ form.whatsapp_number.value|default:'' }}">
            </div>

            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" name="password1" required>
            </div>

            <div class="input-group">
                <label>Confirmar Contraseña</label>
                <input type="password" name="password2" required>
            </div>

            <button type="submit" class="btn-auth">Crear mi cuenta</button>
        </form>
    </div>
</section>
{% endblock %}
