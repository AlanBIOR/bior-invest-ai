{% extends 'base.html' %}
{% block content %}
<section class="auth-container">
    <div class="auth-card">
        <h2>Únete a BIOR Invest</h2>
        <form method="POST" class="auth-form">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="error-banner" style="color: #ff4d4d;">
                    <p>Revisa los errores en el formulario.</p>
                </div>
            {% endif %}

            <div class="input-group">
                <label>Nombre de Usuario</label>
                <input type="text" name="username" placeholder="User123" required value="{{ form.username.value|default:'' }}">
            </div>

            <div class="input-group">
                <label>Nombre</label>
                <input type="text" name="first_name" placeholder="User" required value="{{ form.first_name.value|default:'' }}">
            </div>

            <div class="input-group">
                <label>Apellidos</label>
                <input type="text" name="last_name" placeholder="New" required value="{{ form.last_name.value|default:'' }}">
            </div>

            <div class="input-group">
                <label>WhatsApp (con código de país)</label>
                <input type="text" name="whatsapp_number" placeholder="5212411234567" required value="{{ form.whatsapp_number.value|default:'' }}">
            </div>

            <div class="input-group">
                <label>Contraseña</label>
                <div class="password-wrapper">
                    <input type="password" placeholder="**********" name="password1" id="password1" required>
                    <i class="fas fa-eye toggle-password" data-target="password1"></i>
                </div>
            </div>

            <div class="input-group">
                <label>Confirmar Contraseña</label>
                <div class="password-wrapper">
                    <input type="password" placeholder="**********" name="password2" id="password2" required>
                    <i class="fas fa-eye toggle-password" data-target="password2"></i>
                </div>
            </div>

            <button type="submit" class="btn-auth">Crear mi cuenta</button>
        </form>

        <div class="auth-footer">
            <p>¿No tienes cuenta? <a href="{% url 'registro' %}">Regístrate aquí</a></p>
            <p><a href="{% url 'dashboard' %}">← Volver al Dashboard</a></p>
        </div>
    </div>
</section>
{% endblock %}
